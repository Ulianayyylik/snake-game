name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk
          pip3 install --upgrade pip
          pip3 install cython==0.29.37 buildozer
      
      - name: Build APK
        run: |
          rm -f buildozer.spec
          buildozer init
          sed -i 's/android.api = 35/android.api = 30/' buildozer.spec
          sed -i 's/android.sdk = 35/android.sdk = 30/' buildozer.spec
          sed -i 's/# android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3==3.11.5,kivy==2.3.0,cython==0.29.37/' buildozer.spec
          yes | buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-apk
          path: ./bin/*.apk
