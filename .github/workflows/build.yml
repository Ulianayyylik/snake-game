name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev build-essential git zip unzip openjdk-17-jdk
          sudo apt install -y libffi-dev libssl-dev liblzma-dev
          sudo apt install -y autoconf libtool pkg-config
          sudo apt install -y zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip
          pip3 install cython buildozer

      - name: Create .buildozer spec
        run: |
          buildozer init
          # Правим buildozer.spec для APK
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.api = 35/android.api = 33/' buildozer.spec
          sed -i 's/android.minapi = 21/android.minapi = 21/' buildozer.spec

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-apk
          path: ./bin/*.apk

      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            build.log
            .buildozer/logs/*.log
