name: Build Signed AAB for Google Play

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer

      - name: Build with Buildozer
        run: |
          buildozer init
          buildozer android release 2>&1 | tee build.log
          cat build.log

      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            build.log
            .buildozer/logs/*.log

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-aab
          path: ./bin/*.aab
