name: Build Signed AAB for Google Play

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Release AAB with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: 3.11
          buildozer-cmd: buildozer -v android release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-aab
          path: ./bin/*.aab
