name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev build-essential git zip unzip openjdk-17-jdk
          sudo apt install -y libffi-dev libssl-dev liblzma-dev autoconf libtool pkg-config
          sudo apt install -y zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake

      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install cython buildozer

      - name: Create config
        run: |
          buildozer init
          echo "" >> buildozer.spec
          echo "# Manual fixes" >> buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec
          echo "android.api = 30" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.sdk = 30" >> buildozer.spec
          echo "android.ndk = 23b" >> buildozer.spec
          echo "android.archs = arm64-v8a, armeabi-v7a" >> buildozer.spec

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build_output.txt
          cat build_output.txt

      - name: Show bin folder
        run: |
          ls -la bin/ || echo "bin folder not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-apk
          path: ./bin/*.apk
          if-no-files-found: warn

      - name: Upload full output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build_output.txt
